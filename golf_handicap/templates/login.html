{% extends "base.html" %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1>{{ golfer.name }}</h1>
        <p class="text-muted">Enter your password to continue</p>
        <form method="POST" action="{{ url_for('golfer_login', golfer_id=golfer.id) }}">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>
        <a href="{{ url_for('index') }}" class="page-back" style="display:block;text-align:center;margin-top:1rem;">&larr; Back</a>
    </div>
</div>
{% endblock %}
